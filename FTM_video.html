<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Sayfası</title>

    <style>
        /* Tüm sayfayı logonun boyutu kadar aşağı iter */
        body {
            margin: 0;
            padding-top: 100px; /* Logonun boyuna göre bu sayıyı artırıp azaltabilirsin */
            background-color: #f4f4f4; /* Arka plan rengi (isteğe bağlı) */
            font-family: sans-serif;
            text-align: center; /* Videoyu ortalamak için */
        }

        /* Logo Ayarları */
        .fixed-logo {
            position: fixed !important;
            top: 20px;
            left: 20px;
            z-index: 9999;
        }

        .fixed-logo img {
            width: 70px; /* Logonun büyüklüğü */
            height: auto;
            cursor: pointer;
            border-radius: 8px;
            transition: transform 0.2s;
        }

        .fixed-logo img:hover {
            transform: scale(1.1); /* Üzerine gelince büyüme efekti */
        }

        /* Video Çerçevesi Ayarları */
        .video-container {
            max-width: 800px; /* Videonun ekranda kaplayacağı maksimum genişlik */
            margin: 0 auto;   /* Kutuyu tam ortaya hizalar */
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1); /* Hafif gölge efekti */
            background-color: #000;
        }

        video {
            width: 100%; /* Videoyu kutunun içine tam oturtur */
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <a href="index.html" class="fixed-logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Logo_of_YouTube_%282011-2013%29.svg" alt="Ana Sayfaya Dön">
    </a>

    <div class="video-container">
        <video controls>
            <video src="FTM_video.html" type="video/mp4">
            Your browser cannot open this video.
        </video>
    </div>

</body>
</html>
